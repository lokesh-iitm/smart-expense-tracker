<!DOCTYPE html>
<html>
<head>
    <title>Smart Expense Tracker</title>
    <script src="/static/script.js" defer></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <h1>Smart Expense Tracker</h1>

    <div id="dashboard">

        <h2>Dashboard</h2>

        <div>
            <h3>Total Income</h3>
            <p id="income">Loading...</p>
        </div>

        <div>
            <h3>Total Expense</h3>
            <p id="expense">Loading...</p>
        </div>

        <div>
            <h3>Balance</h3>
            <p id="balance">Loading...</p>
        </div>

        <div>
            <h3>Top Category</h3>
            <p id="category">Loading...</p>
        </div>

    </div>
        <h2>Expenses</h2>
        <h2>Add Expense</h2>

<form id="expense-form">

    <input
        type="text"
        id="title"
        placeholder="Title"
        required
    >

    <input
        type="text"
        id="expense-category"
        placeholder="Category"
        required
    >

    <input
        type="number"
        id="amount"
        placeholder="Amount"
        required
    >

    <input
        type="date"
        id="date"
        required
    >

    <button type="submit">
        Add Expense
    </button>

</form>

    <table id="expense-table">
        <thead>
            <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="expense-body">
        </tbody>
    </table>

</body>
</html>
