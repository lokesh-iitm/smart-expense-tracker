<!DOCTYPE html>
<html>
<head>
    <title>Smart Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/script.js" defer></script>
    <link rel="stylesheet" href="/static/style.css">
    
</head>
<body>

    <h1>Smart Expense Tracker</h1>

    <div id="dashboard">

        <h2>Dashboard</h2>

        <div>
            <h3>Total Income</h3>
            <p id="income">Loading...</p>
        </div>

        <div>
            <h3>Total Expense</h3>
            <p id="expense">Loading...</p>
        </div>

        <div>
            <h3>Balance</h3>
            <p id="balance">Loading...</p>
        </div>

        <div>
            <h3>Top Category</h3>
            <p id="category">Loading...</p>
        </div>

    </div>
    <h2>Category Spending Analysis</h2>

<canvas id="categoryChart"></canvas>
       
        <
        <h2>Add Income</h2>

<form id="income-form">

    <input
        type="text"
        id="income-source"
        placeholder="Income Source"
        required
    >

    <input
        type="number"
        id="income-amount"
        placeholder="Amount"
        required
    >

    <button type="submit">
        Add Income
    </button>

</form>
<h2>Income History</h2>

<table>

    <thead>
        <tr>
            <th>Source</th>
            <th>Amount</th>
        </tr>
    </thead>

    <tbody id="income-body">
    </tbody>

</table>
<h2>Add Expense</h2>

<form id="expense-form">

    <input
        type="text"
        id="title"
        placeholder="Title"
        required
    >

    <input
        type="text"
        id="expense-category"
        placeholder="Category"
        required
    >

    <input
        type="number"
        id="amount"
        placeholder="Amount"
        required
    >

    <input
        type="date"
        id="date"
        required
    >

    <button type="submit">
        Add Expense
    </button>

</form>
 <h2>Expenses</h2>

    <table id="expense-table">
        <thead>
            <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="expense-body">
        </tbody>
    </table>

</body>
</html>
